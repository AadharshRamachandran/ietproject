services:
  - type: web
    name: aethernet-backend
    runtime: python
    pythonVersion: 3.12
    region: oregon
    buildCommand: pip install -r backend/requirements-prod.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "true"
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: APP_ENV
        value: production
    autoDeploy: true
